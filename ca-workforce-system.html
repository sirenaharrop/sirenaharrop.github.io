    // ════════════════════════════════════════════════════════════════
    // ORTHOGONAL ARROW
    // ════════════════════════════════════════════════════════════════
    function getExitPoint(id, targetId) {
      const b = BOXES[id], t = BOXES[targetId];
      if (!b || !t) return [0, 0];
      const bc = [b.x + b.w / 2, b.y + b.h / 2];
      const tc = [t.x + t.w / 2, t.y + t.h / 2];
      const dy = tc[1] - bc[1], dx = tc[0] - bc[0];
      if (Math.abs(dy) > 15) {
        return [Math.max(b.x + 8, Math.min(b.x + b.w - 8, tc[0])), dy > 0 ? b.y + b.h : b.y];
      }
      return [dx > 0 ? b.x + b.w : b.x, Math.max(b.y + 8, Math.min(b.y + b.h - 8, tc[1]))];
    }
    function getEntryPoint(id, sourceId) {
      const b = BOXES[id], s = BOXES[sourceId];
      if (!b || !s) return [0, 0];
      const bc = [b.x + b.w / 2, b.y + b.h / 2];
      const sc = [s.x + s.w / 2, s.y + s.h / 2];
      const dy = sc[1] - bc[1], dx = sc[0] - bc[0];
      if (Math.abs(dy) > 15) {
        return [Math.max(b.x + 8, Math.min(b.x + b.w - 8, sc[0])), dy > 0 ? b.y + b.h : b.y];
      }
      return [dx > 0 ? b.x + b.w : b.x, Math.max(b.y + 8, Math.min(b.y + b.h - 8, sc[1]))];
    }

    function OrthoArrow({ from, to, color, label, offset = 0 }) {
      const [sx, sy] = getExitPoint(from, to);
      const [ex, ey] = getEntryPoint(to, from);
      const ox = offset * 4;
      const midY = (sy + ey) / 2 + ox;
      const path = `M ${sx+ox} ${sy} L ${sx+ox} ${midY} L ${ex+ox} ${midY} L ${ex+ox} ${ey}`;
      const goingDown = ey > sy;
      let arrow;
      if (goingDown) {
        arrow = `${ex+ox-4},${ey-7} ${ex+ox},${ey} ${ex+ox+4},${ey-7}`;
      } else {
        arrow = `${ex+ox-4},${ey+7} ${ex+ox},${ey} ${ex+ox+4},${ey+7}`;
      }
      const lx = (sx + ex) / 2 + ox;
      const ly = midY - 5;
      return (
        <g>
          <path d={path} fill="none" stroke={color} strokeWidth={2} opacity={0.85} />
          <polygon points={arrow} fill={color} opacity={0.85} />
          {label && (
            <g>
              <rect x={lx - label.length * 2.6 - 2} y={ly - 7} width={label.length * 5.2 + 4} height={12} rx={2} fill="white" fillOpacity={0.95} stroke={color} strokeWidth={0.5} />
              <text x={lx} y={ly + 2} textAnchor="middle" fontSize={7} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" fill={color}>{label}</text>
            </g>
          )}
        </g>
      );
    }

      activeFunding.forEach(fk => FUNDING[fk]?.arrows.forEach(a => { fundH.add(a.from); fundH.add(a.to); }));
      const dataH = new Set();
      activeData.forEach(dk => DATAFLOWS[dk]?.arrows.forEach(a => { dataH.add(a.from); dataH.add(a.to); }));

      const allH = new Set([...progH, ...fundH, ...dataH]);

      const boxOpacity = (id) => !anyFilter ? 1 : allH.has(id) ? 1 : 0.1;
      const boxGlow = (id) => activePrograms.filter(p => PROGRAMS[p]?.entities.includes(id)).map(p => PROGRAMS[p].color);

        background: active ? color : "#fff", color: active ? "#fff" : color,
        fontSize: 8, fontWeight: 700, cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace",
        textTransform: "uppercase", letterSpacing: "0.03em", transition: "all 0.15s",
      });

      return (
        <div style={{ padding: "16px 12px" }}>
          <h1 style={{ fontSize: 22, fontWeight: 900, fontFamily: "'Playfair Display', serif", color: "#1a1a2e", margin: "0 0 3px 0" }}>

          </p>

          {/* Controls */}
          <div style={{ display: "flex", gap: 16, marginBottom: 14, flexWrap: "wrap", fontSize: 10, fontFamily: "'IBM Plex Mono', monospace" }}>
            <div style={{ minWidth: 200 }}>
              <div style={{ fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.1em", color: "#555", marginBottom: 4, fontSize: 8 }}>Programs</div>
              <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                {Object.entries(PROGRAMS).map(([k, p]) => (
                  <button key={k} onClick={() => toggleProg(k)} style={btnStyle(activePrograms.includes(k), p.color)}>{p.label}</button>
                ))}
              </div>
            </div>
            <div style={{ minWidth: 260 }}>
              <div style={{ fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.1em", color: "#555", marginBottom: 4, fontSize: 8 }}>Funding Flows</div>
              <div style={{ display: "flex", gap: 3, flexWrap: "wrap", marginBottom: 3 }}>
                <button onClick={() => toggleFundGroup("ongoing")} style={btnStyle(
                  Object.entries(FUNDING).filter(([_,v])=>v.group==="ongoing").every(([k])=>activeFunding.includes(k)), "#2d3436"
                )}>All Ongoing</button>
                <button onClick={() => toggleFundGroup("time-limited")} style={btnStyle(
                  Object.entries(FUNDING).filter(([_,v])=>v.group==="time-limited").every(([k])=>activeFunding.includes(k)), "#d63031"
                )}>All Time-Limited</button>
              </div>
              <div style={{ display: "flex", gap: 2, flexWrap: "wrap" }}>
                {Object.entries(FUNDING).map(([k, f]) => (
                  <button key={k} onClick={() => toggleFund(k)} style={{
                    ...btnStyle(activeFunding.includes(k), f.color), fontSize: 7, padding: "2px 5px",
                  }}>{f.label}</button>
                ))}
              </div>
            </div>
            <div style={{ minWidth: 160 }}>
              <div style={{ fontWeight: 800, textTransform: "uppercase", letterSpacing: "0.1em", color: "#555", marginBottom: 4, fontSize: 8 }}>Data Flows</div>

                  <button key={k} onClick={() => toggleData(k)} style={btnStyle(activeData.includes(k), d.color)}>{d.label}</button>

              </div>
            </div>
            <div style={{ display: "flex", alignItems: "flex-end" }}>
              <button onClick={() => { setActivePrograms([]); setActiveFunding([]); setActiveData([]); }} style={{
                padding: "4px 12px", borderRadius: 3, border: "1px solid #ccc",
                background: !anyFilter ? "#1a1a2e" : "#fff", color: !anyFilter ? "#fff" : "#888",
                fontSize: 9, fontWeight: 700, cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace",
              }}>Reset</button>
            </div>
          </div>

          {/* SVG Map */}
          <div style={{ overflowX: "auto", border: "1px solid #e0e0e0", borderRadius: 8, background: "#fff" }}>
            <svg viewBox="0 0 1000 850" width="100%" style={{ minWidth: 860, display: "block" }}>
              {/* Zones */}
              {ZONES.map(z => (
                <g key={z.id}>
                  <rect x={z.x} y={z.y} width={z.w} height={z.h} rx={6}
                    fill={z.bg} stroke={z.border} strokeWidth={1.5}
                    strokeDasharray={z.dotted ? "3,3" : "none"} />
                  {z.label && (
                    <text x={z.x + 8} y={z.y + 14} fontSize={8} fontWeight={800}
                      fontFamily="'IBM Plex Mono', monospace" fill={z.border}
                      letterSpacing="0.08em">{z.label}</text>
                  )}
                </g>
              ))}
              <text x={40} y={155} fontSize={7} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" fill="#6c5ce7" letterSpacing="0.05em">Governor's Cabinet: LWDA</text>
              <text x={432} y={172} fontSize={6.5} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" fill="#636e72" letterSpacing="0.04em">Governor Direct / CalHHS</text>
              <text x={592} y={172} fontSize={6.5} fontWeight={700} fontFamily="'IBM Plex Mono', monospace" fill="#00796b" letterSpacing="0.04em">Board of Govs / Elected Supt / Other</text>

              {/* Boxes */}
              {Object.entries(BOXES).map(([id, b]) => {
                const op = boxOpacity(id);
                const glows = boxGlow(id);
                const isFed = b.zone === "federal";
                const isW = id === "workers";
                const isD = b.zone === "data";
                return (
                  <g key={id} opacity={op} style={{ transition: "opacity 0.25s" }}>
                    {glows.map((c, i) => (
                      <rect key={i} x={b.x-3-i*3} y={b.y-3-i*3} width={b.w+6+i*6} height={b.h+6+i*6}
                        rx={6} fill="none" stroke={c} strokeWidth={2.5} opacity={0.6} />
                    ))}
                    <rect x={b.x} y={b.y} width={b.w} height={b.h} rx={4}
                      fill={isFed?"#2d3436":isW?"#fff3e0":isD?"#e3f2fd":"#fff"}
                      stroke={b.dashed?"#999":isFed?"#555":isW?"#e65100":"#bbb"}
                      strokeWidth={isW?2.5:1.5} strokeDasharray={b.dashed?"4,2":"none"} />
                    <text x={b.x+b.w/2} y={b.y+(b.sub?b.h/2-2:b.h/2+3)} textAnchor="middle"
                      fontSize={isW?11:8.5} fontWeight={700} fontFamily="'IBM Plex Sans', sans-serif"
                      fill={isFed?"#fff":"#1a1a2e"}>{b.label}</text>
                    {b.sub && (
                      <text x={b.x+b.w/2} y={b.y+b.h/2+9} textAnchor="middle"
                        fontSize={6.5} fontWeight={400} fontFamily="'IBM Plex Sans', sans-serif"
                        fill={isFed?"#aaa":"#888"}>{b.sub}</text>
                    )}
                  </g>
                );
              })}

              {/* Funding arrows */}
              {activeFunding.map(fk => {
                const f = FUNDING[fk];
                return f ? f.arrows.map((a, i) => (
                  <OrthoArrow key={`f-${fk}-${i}`} from={a.from} to={a.to} color={f.color} label={a.amt} offset={i-1} />
                )) : null;
              })}

              {/* Data flow arrows */}
              {activeData.map(dk => {
                const d = DATAFLOWS[dk];
                return d ? d.arrows.map((a, i) => (
                  <OrthoArrow key={`d-${dk}-${i}`} from={a.from} to={a.to} color={d.color} label={a.amt} offset={i} />
                )) : null;
              })}
            </svg>
          </div>

          {/* Legend */}
          <div style={{
            marginTop: 8, background: "#fff", borderRadius: 6, border: "1px solid #eee", padding: 8,
            display: "flex", gap: 12, flexWrap: "wrap", fontSize: 8, fontFamily: "'IBM Plex Mono', monospace", color: "#888",
          }}>
            <span><strong style={{ color: "#444" }}>Legend:</strong></span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              <span style={{ display: "inline-block", width: 14, height: 9, border: "1.5px dashed #999", borderRadius: 2 }}></span> Board / Panel / Advisory
            </span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              <span style={{ display: "inline-block", width: 14, height: 9, background: "#2d3436", borderRadius: 2 }}></span> Federal
            </span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              <span style={{ display: "inline-block", width: 14, height: 9, background: "#e3f2fd", border: "1px solid #90caf9", borderRadius: 2 }}></span> Data system
            </span>
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              <span style={{ display: "inline-block", width: 14, height: 9, border: "1.5px dotted #6c5ce7", borderRadius: 2, background: "#ede7f6" }}></span> LWDA cluster
            </span>
            <span>|</span>
            <span style={{ fontWeight: 700, color: "#2d3436" }}>Ongoing = permanent annual flows</span>
            <span style={{ fontWeight: 700, color: "#d63031" }}>Time-limited = one-time or discretionary</span>
          </div>
          <div style={{ marginTop: 4, fontSize: 7, color: "#bbb", fontFamily: "'IBM Plex Mono', monospace", lineHeight: 1.5 }}>
            CalWORKs $1.6B is mostly cash assistance, not training. CWDB & ETP are boards/panels, not departments.
            CCC Chancellor reports to Board of Governors (appointed), not Governor. CDE reports to elected State Superintendent.
            Dollar figures are approximations — see source reference guide for citations.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
